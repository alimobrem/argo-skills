<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" fill="none">
  <defs>
    <linearGradient id="tbg3" x1="0" y1="0" x2="0" y2="400">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#16161e"/>
    </linearGradient>
  </defs>

  <!-- Window -->
  <rect width="820" height="400" rx="10" fill="url(#tbg3)"/>
  <!-- Title bar -->
  <rect width="820" height="36" rx="10" fill="#24283b"/>
  <rect y="26" width="820" height="10" fill="#24283b"/>
  <circle cx="20" cy="18" r="6" fill="#f7768e"/>
  <circle cx="40" cy="18" r="6" fill="#e0af68"/>
  <circle cx="60" cy="18" r="6" fill="#9ece6a"/>
  <text x="410" y="22" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#565f89" text-anchor="middle">argo-operations — promote canary rollout</text>

  <!-- Content -->
  <g transform="translate(24, 52)" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="12.5">

    <!-- Step 1: Check status -->
    <rect x="0" y="0" width="56" height="18" rx="4" fill="#7aa2f7" opacity="0.2"/>
    <text x="8" y="13" fill="#7aa2f7" font-size="10" font-weight="700">STEP 1</text>
    <text x="66" y="13" fill="#565f89">Check current rollout status</text>

    <text y="36" fill="#565f89">$</text>
    <text x="16" y="36" fill="#c0caf5">oc argo rollouts get rollout frontend -n production</text>

    <text y="58" fill="#565f89">Name:</text><text x="100" y="58" fill="#c0caf5">frontend</text>
    <text y="74" fill="#565f89">Namespace:</text><text x="100" y="74" fill="#c0caf5">production</text>
    <text y="90" fill="#565f89">Status:</text>
    <rect x="100" y="78" width="58" height="18" rx="4" fill="#e0af68" opacity="0.2"/>
    <text x="108" y="91" fill="#e0af68" font-weight="700" font-size="11">Paused</text>
    <text y="106" fill="#565f89">Step:</text><text x="100" y="106" fill="#c0caf5">3/6 (setWeight: 30 — analysis)</text>
    <text y="122" fill="#565f89">Canary:</text><text x="100" y="122" fill="#c0caf5">30% traffic (2 of 5 replicas)</text>
    <text y="138" fill="#565f89">Stable:</text><text x="100" y="138" fill="#c0caf5">70% traffic (3 of 5 replicas)</text>

    <!-- Separator -->
    <line x1="0" y1="156" x2="772" y2="156" stroke="#292e42" stroke-width="1"/>

    <!-- Step 2: Preview -->
    <rect x="0" y="168" width="56" height="18" rx="4" fill="#7aa2f7" opacity="0.2"/>
    <text x="8" y="181" fill="#7aa2f7" font-size="10" font-weight="700">STEP 2</text>
    <text x="66" y="181" fill="#565f89">Preview what promote will do</text>

    <text y="204" fill="#a9b1d6">Promoting will advance the rollout from step 3 to step 4:</text>
    <text y="224" fill="#565f89">  Step 3</text><text x="80" y="224" fill="#e0af68">setWeight: 30 + analysis</text><text x="290" y="224" fill="#565f89">(current — paused for analysis)</text>
    <text y="240" fill="#565f89">  Step 4</text><text x="80" y="240" fill="#9ece6a">setWeight: 60</text><text x="290" y="240" fill="#565f89">(next — canary gets 60% traffic)</text>

    <!-- Separator -->
    <line x1="0" y1="258" x2="772" y2="258" stroke="#292e42" stroke-width="1"/>

    <!-- Step 3: Confirm -->
    <rect x="0" y="270" width="56" height="18" rx="4" fill="#7aa2f7" opacity="0.2"/>
    <text x="8" y="283" fill="#7aa2f7" font-size="10" font-weight="700">STEP 3</text>
    <text x="66" y="283" fill="#565f89">Confirm before applying</text>

    <text y="308" fill="#565f89">Command:</text>
    <text x="80" y="308" fill="#c0caf5">oc argo rollouts promote frontend -n production</text>

    <!-- Safety box -->
    <rect x="0" y="322" width="772" height="32" rx="6" fill="#D2A8FF" opacity="0.08" stroke="#D2A8FF" stroke-width="1" stroke-opacity="0.3"/>
    <text x="16" y="343" fill="#D2A8FF" font-weight="700" font-size="13">Apply this? (yes/no)</text>
    <rect x="210" y="330" width="10" height="16" rx="2" fill="#D2A8FF" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
