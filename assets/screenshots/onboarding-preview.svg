<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" fill="none">
  <defs>
    <linearGradient id="tbg4" x1="0" y1="0" x2="0" y2="460">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#16161e"/>
    </linearGradient>
  </defs>

  <!-- Window -->
  <rect width="820" height="460" rx="10" fill="url(#tbg4)"/>
  <!-- Title bar -->
  <rect width="820" height="36" rx="10" fill="#24283b"/>
  <rect y="26" width="820" height="10" fill="#24283b"/>
  <circle cx="20" cy="18" r="6" fill="#f7768e"/>
  <circle cx="40" cy="18" r="6" fill="#e0af68"/>
  <circle cx="60" cy="18" r="6" fill="#9ece6a"/>
  <text x="410" y="22" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#565f89" text-anchor="middle">argo-team-onboard — onboard payments team</text>

  <!-- Content -->
  <g transform="translate(24, 52)" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="12.5">

    <!-- Discovery phase -->
    <rect x="0" y="0" width="76" height="18" rx="4" fill="#bb9af7" opacity="0.2"/>
    <text x="8" y="13" fill="#bb9af7" font-size="10" font-weight="700">DISCOVERY</text>
    <text x="86" y="13" fill="#565f89">Building team profile...</text>

    <text y="36" fill="#565f89">Team:</text><text x="100" y="36" fill="#c0caf5">payments</text>
    <text y="54" fill="#565f89">Source:</text><text x="100" y="54" fill="#c0caf5">Kustomize (overlays/dev, staging, prod)</text>
    <text y="72" fill="#565f89">Repo:</text><text x="100" y="72" fill="#7aa2f7">https://github.com/acme/payments.git</text>
    <text y="90" fill="#565f89">SSO Group:</text><text x="100" y="90" fill="#c0caf5">payments-developers</text>
    <text y="108" fill="#565f89">Envs:</text><text x="100" y="108" fill="#9ece6a">dev</text>
    <text x="140" y="108" fill="#565f89">→</text>
    <text x="160" y="108" fill="#e0af68">staging</text>
    <text x="220" y="108" fill="#565f89">→</text>
    <text x="240" y="108" fill="#f7768e">prod (manual)</text>

    <!-- Separator -->
    <line x1="0" y1="128" x2="772" y2="128" stroke="#24283b" stroke-width="1"/>

    <!-- Generate phase -->
    <rect x="0" y="140" width="72" height="18" rx="4" fill="#7aa2f7" opacity="0.2"/>
    <text x="8" y="153" fill="#7aa2f7" font-size="10" font-weight="700">GENERATE</text>
    <text x="82" y="153" fill="#565f89">Argo CD resources for payments team</text>

    <text y="178" fill="#9ece6a">✓</text><text x="16" y="178" fill="#c0caf5">AppProject</text>
    <text x="120" y="178" fill="#565f89">team-payments — 1 repo, 3 namespaces, scoped RBAC</text>

    <text y="198" fill="#9ece6a">✓</text><text x="16" y="198" fill="#c0caf5">Application ×3</text>
    <text x="120" y="198" fill="#565f89">dev (auto-sync) | staging (auto-sync) | prod (auto-sync)</text>

    <text y="218" fill="#9ece6a">✓</text><text x="16" y="218" fill="#c0caf5">PromotionStrategy</text>
    <text x="120" y="218" fill="#565f89">dev→staging (auto) → prod (manual merge)</text>

    <text y="238" fill="#9ece6a">✓</text><text x="16" y="238" fill="#c0caf5">ArgocdCommitStatus</text>
    <text x="120" y="238" fill="#565f89">Health gating between environments</text>

    <text y="258" fill="#9ece6a">✓</text><text x="16" y="258" fill="#c0caf5">RBAC</text>
    <text x="120" y="258" fill="#565f89">get, sync, action/* — no exec, no delete</text>

    <!-- Separator -->
    <line x1="0" y1="278" x2="772" y2="278" stroke="#24283b" stroke-width="1"/>

    <!-- Safety model -->
    <rect x="0" y="290" width="64" height="18" rx="4" fill="#e0af68" opacity="0.2"/>
    <text x="8" y="303" fill="#e0af68" font-size="10" font-weight="700">PREVIEW</text>
    <text x="74" y="303" fill="#565f89">Dry-run before applying</text>

    <text y="328" fill="#565f89">$</text>
    <text x="16" y="328" fill="#c0caf5">kubectl apply --dry-run=server -f team-payments.yaml</text>
    <text y="348" fill="#9ece6a">appproject.argoproj.io/team-payments created (dry run)</text>
    <text y="366" fill="#9ece6a">application.argoproj.io/payments-dev created (dry run)</text>
    <text y="384" fill="#9ece6a">application.argoproj.io/payments-staging created (dry run)</text>
    <text y="402" fill="#9ece6a">application.argoproj.io/payments-prod created (dry run)</text>

  </g>
</svg>
