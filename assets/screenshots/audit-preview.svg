<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" fill="none">
  <defs>
    <linearGradient id="tbg" x1="0" y1="0" x2="0" y2="420">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#16161e"/>
    </linearGradient>
  </defs>

  <!-- Window -->
  <rect width="820" height="420" rx="10" fill="url(#tbg)"/>
  <!-- Title bar -->
  <rect width="820" height="36" rx="10" fill="#24283b"/>
  <rect y="26" width="820" height="10" fill="#24283b"/>
  <circle cx="20" cy="18" r="6" fill="#f7768e"/>
  <circle cx="40" cy="18" r="6" fill="#e0af68"/>
  <circle cx="60" cy="18" r="6" fill="#9ece6a"/>
  <text x="410" y="22" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#565f89" text-anchor="middle">argo-repo-audit — mixed-issues</text>

  <!-- Content -->
  <g transform="translate(24, 52)" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="12.5">

    <!-- Title -->
    <text y="0" fill="#7aa2f7" font-weight="700" font-size="14">Argo GitOps Audit Report</text>

    <!-- Summary -->
    <text y="26" fill="#565f89">Pattern</text><text x="160" y="26" fill="#c0caf5">Multi-Repo</text>
    <text y="44" fill="#565f89">Clusters</text><text x="160" y="44" fill="#c0caf5">kubernetes.default.svc, staging.k8s.example.com</text>
    <text y="62" fill="#565f89">Argo Resources</text><text x="160" y="62" fill="#c0caf5">5 App, 2 AppProject, 2 Rollout, 1 AT, 3 Workflow</text>
    <text y="80" fill="#565f89">Status</text>
    <rect x="160" y="68" width="42" height="18" rx="4" fill="#f7768e" opacity="0.2"/>
    <text x="170" y="81" fill="#f7768e" font-weight="700" font-size="11">FAIL</text>

    <!-- Separator -->
    <line x1="0" y1="96" x2="772" y2="96" stroke="#292e42" stroke-width="1"/>

    <!-- Findings header -->
    <text y="116" fill="#7aa2f7" font-weight="700" font-size="13">Top Findings</text>

    <!-- Finding 1 -->
    <rect x="0" y="130" width="68" height="18" rx="4" fill="#f7768e" opacity="0.2"/>
    <text x="8" y="143" fill="#f7768e" font-size="10" font-weight="700">CRITICAL</text>
    <text x="78" y="143" fill="#c0caf5">backend-app.yaml:26</text>
    <text x="250" y="143" fill="#a9b1d6">Plain-text database credentials in stringData</text>

    <!-- Finding 2 -->
    <rect x="0" y="156" width="68" height="18" rx="4" fill="#f7768e" opacity="0.2"/>
    <text x="8" y="169" fill="#f7768e" font-size="10" font-weight="700">CRITICAL</text>
    <text x="78" y="169" fill="#c0caf5">cluster-secret.yaml:13</text>
    <text x="250" y="169" fill="#a9b1d6">Bearer token in plain text, insecure TLS</text>

    <!-- Finding 3 -->
    <rect x="0" y="182" width="68" height="18" rx="4" fill="#f7768e" opacity="0.2"/>
    <text x="8" y="195" fill="#f7768e" font-size="10" font-weight="700">CRITICAL</text>
    <text x="78" y="195" fill="#c0caf5">default-override.yaml</text>
    <text x="250" y="195" fill="#a9b1d6">Wildcard *, */* in sourceRepos, destinations, RBAC</text>

    <!-- Finding 4 -->
    <rect x="0" y="208" width="44" height="18" rx="4" fill="#e0af68" opacity="0.2"/>
    <text x="8" y="221" fill="#e0af68" font-size="10" font-weight="700">HIGH</text>
    <text x="78" y="221" fill="#c0caf5">redis.yaml:15</text>
    <text x="250" y="221" fill="#a9b1d6">Hardcoded password in Helm values</text>

    <!-- Finding 5 -->
    <rect x="0" y="234" width="44" height="18" rx="4" fill="#e0af68" opacity="0.2"/>
    <text x="8" y="247" fill="#e0af68" font-size="10" font-weight="700">HIGH</text>
    <text x="78" y="247" fill="#c0caf5">api-server.yaml</text>
    <text x="250" y="247" fill="#a9b1d6">No syncPolicy — manual sync only, no selfHeal</text>

    <!-- Separator -->
    <line x1="0" y1="262" x2="772" y2="262" stroke="#292e42" stroke-width="1"/>

    <!-- Recommendations -->
    <text y="282" fill="#7aa2f7" font-weight="700" font-size="13">Recommendations</text>

    <text y="304" fill="#9ece6a">1.</text><text x="22" y="304" fill="#a9b1d6">Replace all plain-text Secrets with SealedSecret or ExternalSecret.</text>
    <text y="324" fill="#9ece6a">2.</text><text x="22" y="324" fill="#a9b1d6">Lock down AppProject wildcards — explicit allow-lists per team.</text>
    <text y="344" fill="#9ece6a">3.</text><text x="22" y="344" fill="#a9b1d6">Add syncPolicy.automated with selfHeal + prune to all Applications.</text>
  </g>
</svg>
