apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
  namespace: checkout
spec:
  metrics:
    - name: success-rate
      interval: 30s
      successCondition: result[0] >= 0.95
      provider:
        prometheus:
          address: http://prometheus.istio-system:9090
          query: |
            sum(rate(istio_requests_total{destination_service_name="checkout-svc",response_code!~"5.*"}[2m]))
            /
            sum(rate(istio_requests_total{destination_service_name="checkout-svc"}[2m]))
