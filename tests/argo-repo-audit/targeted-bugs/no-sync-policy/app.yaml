apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: inventory-svc
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/acme/inventory-svc.git
    targetRevision: v3.0.0
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: inventory
