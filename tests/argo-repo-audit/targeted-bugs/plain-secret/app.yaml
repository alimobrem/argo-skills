apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/acme/api-backend.git
    targetRevision: v1.5.0
    path: deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
