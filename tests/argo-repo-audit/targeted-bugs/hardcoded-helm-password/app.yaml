apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-cache
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: redis
    targetRevision: 18.6.1
    helm:
      values: |
        auth:
          enabled: true
          password: "Redis!Pr0d#2026"
        master:
          persistence:
            size: 10Gi
        replica:
          replicaCount: 3
  destination:
    server: https://kubernetes.default.svc
    namespace: cache
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
