apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: frontend=ghcr.io/acme-corp/frontend
    argocd-image-updater.argoproj.io/frontend.update-strategy: latest
spec:
  project: default
  source:
    repoURL: https://github.com/acme-corp/frontend.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: frontend
  syncPolicy:
    automated:
      prune: false
