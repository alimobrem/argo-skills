apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-ingress
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: platform
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: nginx-ingress-controller
    targetRevision: 11.6.*
    helm:
      releaseName: nginx-ingress
      values: |
        replicaCount: 2
        service:
          type: LoadBalancer
        metrics:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
