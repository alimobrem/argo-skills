apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: podinfo-staging
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/example/gitops-repo.git
    targetRevision: main
    path: clusters/staging/podinfo
  destination:
    server: https://staging.example.com
    namespace: platform-podinfo
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: podinfo-production
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/example/gitops-repo.git
    targetRevision: v1.2.0
    path: clusters/production/podinfo
  destination:
    server: https://kubernetes.default.svc
    namespace: platform-podinfo
  syncPolicy:
    automated:
      selfHeal: true
      prune: false
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
