apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
spec:
  description: Platform team project
  sourceRepos:
    - "https://github.com/example/gitops-repo.git"
  destinations:
    - server: https://kubernetes.default.svc
      namespace: "platform-*"
    - server: https://staging.example.com
      namespace: "platform-*"
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: "networking.k8s.io"
      kind: NetworkPolicy
  namespaceResourceBlacklist:
    - group: ""
      kind: ResourceQuota
    - group: ""
      kind: LimitRange
  orphanedResources:
    warn: true
