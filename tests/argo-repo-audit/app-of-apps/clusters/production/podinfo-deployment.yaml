apiVersion: apps/v1
kind: Deployment
metadata:
  name: podinfo
  namespace: platform-podinfo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: podinfo
  template:
    metadata:
      labels:
        app: podinfo
    spec:
      containers:
        - name: podinfo
          image: ghcr.io/stefanprodan/podinfo:6.7.0
          ports:
            - containerPort: 9898
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: podinfo
  namespace: platform-podinfo
spec:
  type: ClusterIP
  ports:
    - port: 9898
      targetPort: 9898
  selector:
    app: podinfo
