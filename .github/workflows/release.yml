name: release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package skills
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          for skill in skills/*/; do
            name=$(basename "$skill")
            tar -czf "dist/${name}-${TAG}.tar.gz" -C skills "$name"
            (cd skills && zip -qr "../dist/${name}-${TAG}.zip" "$name")
          done
          (cd dist && sha256sum * > checksums.txt)
          ls -la dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            dist/*
